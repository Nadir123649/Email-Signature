<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preston & Co - Email Signature</title>

    <style>
        /* Reset and client-specific overrides */
        body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            background-color: #FFFFFF;
        }

        table,
        td {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
            -ms-interpolation-mode: bicubic;
            display: block;
        }

        a {
            text-decoration: none;
        }

        a[x-apple-data-detectors] {
            color: inherit !important;
            text-decoration: none !important;
            font-size: inherit !important;
            font-family: inherit !important;
            font-weight: inherit !important;
            line-height: inherit !important;
        }

        .gmail-fix {
            display: none !important;
            max-height: 0px;
            overflow: hidden;
        }

        /* --- Mobile responsive: stack layout, scale sizes --- */
        @media only screen and (max-width: 480px) {
            .signature-wrapper {
                width: 100% !important;
                max-width: 100% !important;
                padding: 8px 10px !important;
            }

            /* Left logo card: full width, top of stack */
            .logo-card-cell {
                width: 100% !important;
                height: auto !important;
                display: block !important;
                padding: 16px 20px !important;
                border-radius: 8px 8px 0 0 !important;
                box-sizing: border-box;
                background-color: #353A3D !important;
            }

            .logo-title {
                font-size: 18px !important;
                letter-spacing: 2px !important;
                white-space: normal !important;
            }

            .logo-subtitle {
                font-size: 9px !important;
                letter-spacing: 3px !important;
                white-space: normal !important;
            }

            /* Hide spacers and vertical divider on mobile */
            .spacer-cell,
            .divider-cell {
                display: none !important;
                width: 0 !important;
                height: 0 !important;
                font-size: 0 !important;
                line-height: 0 !important;
                padding: 0 !important;
            }

            .content-cell {
                width: 100% !important;
                padding: 12px 16px 8px 16px !important;
                display: block !important;
                box-sizing: border-box;
            }

            .role-text {
                font-size: 10px !important;
                letter-spacing: 2px !important;
                white-space: normal !important;
                padding-top: 6px !important;
            }

            .contact-text {
                font-size: 13px !important;
            }

            .tagline-text {
                font-size: 10px !important;
                letter-spacing: 2px !important;
                padding: 10px 0 2px 0 !important;
                text-align: center !important;
                width: 100% !important;
                padding-left: 0 !important;
            }

            .footer-cell {
                font-size: 9px !important;
                padding: 8px 12px !important;
                text-align: center !important;
            }

            /* full-width gold divider under tagline */
            .full-divider {
                width: 100% !important;
                display: block !important;
            }

            /* image resize */
            .name-image {
                width: 180px !important;
                height: auto !important;
            }

            /* tagline wrapper for center alignment */
            .tagline-wrapper {
                text-align: center !important;
            }
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #FFFFFF; text-align: center;">
