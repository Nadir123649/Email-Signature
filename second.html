<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preston & Co – Email Signature</title>
    <style>
        /* --- reset / cross-client foundations --- */
        body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            background-color: #FFFFFF;
        }
        table, td {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        img {
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
            -ms-interpolation-mode: bicubic;
            display: block;
        }
        a {
            text-decoration: none;
        }
        a[x-apple-data-detectors] {
            color: inherit !important;
            text-decoration: none !important;
            font-size: inherit !important;
            font-family: inherit !important;
            font-weight: inherit !important;
            line-height: inherit !important;
        }
        .gmail-fix {
            display: none !important;
            max-height: 0px;
            overflow: hidden;
        }

        /* --- responsive: mobile first, adjusts from 480px --- */
        @media only screen and (max-width: 480px) {
            .signature-wrapper {
                width: 100% !important;
                max-width: 100% !important;
                padding: 8px 12px !important;
            }
            /* left logo card: full width, stacked above content */
            .logo-card-cell {
                width: 100% !important;
                height: auto !important;
                display: block !important;
                padding: 16px 20px !important;
                border-radius: 8px 8px 0 0 !important;
                box-sizing: border-box;
                background-color: #353A3D !important;
            }
            .logo-title {
                font-size: 18px !important;
                letter-spacing: 2px !important;
                white-space: normal !important;
            }
            .logo-subtitle {
                font-size: 9px !important;
                letter-spacing: 3px !important;
                white-space: normal !important;
            }
            /* hide dividers / spacers on mobile to stack naturally */
            .spacer-cell,
            .divider-cell {
                display: none !important;
                width: 0 !important;
                height: 0 !important;
                font-size: 0 !important;
                line-height: 0 !important;
                padding: 0 !important;
            }
            .content-cell {
                width: 100% !important;
                padding: 12px 16px 8px 16px !important;
                display: block !important;
                box-sizing: border-box;
            }
            .name-text {
                font-size: 28px !important;
            }
            .role-text {
                font-size: 10px !important;
                letter-spacing: 2px !important;
                white-space: normal !important;
                padding-top: 6px !important;
            }
            .contact-text {
                font-size: 13px !important;
            }
            .tagline-text {
                font-size: 10px !important;
                letter-spacing: 2px !important;
                padding: 10px 0 2px 0 !important;
                text-align: center !important;
                width: 100% !important;
            }
            .footer-cell {
                font-size: 9px !important;
                padding: 8px 12px !important;
                text-align: center !important;
            }
            /* full-width gold divider under tagline */
            .full-divider {
                width: 100% !important;
                display: block !important;
            }
            /* remove rowspan stacking: make left card block, then content block */
            .stack-row {
                display: block !important;
                width: 100% !important;
            }
            .stack-cell {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box;
            }
            /* image resize */
            .name-image {
                width: 180px !important;
                height: auto !important;
            }
            /* footer bar full width */
            .footer-table {
                width: 100% !important;
            }
            /* adjust gap and line */
            .mobile-gold-line {
                width: 60px !important;
                margin: 0 auto !important;
            }
            .tagline-wrapper {
                text-align: center !important;
            }
        }
    </style>
</head>
<body style="margin:0;padding:0;background-color:#FFFFFF;text-align:center;">

                            </table>

                            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="width:100%;">
                                <!-- name image -->

                                        <img src="https://res.cloudinary.com/df80crgrw/image/upload/e_trim/v1782289972/Sophie_Preston_dcljgx.png"

                                    <td style="padding-top:10px;padding-bottom:12px;">
                                        <table cellpadding="0" cellspacing="0" border="0" width="60" style="width:60px;">
                                            <tr><td height="1" bgcolor="#DCBB9A" style="font-size:1px;line-height:1.5px;height:1.5px;background-color:#DCBB9A;"></td></tr>

                                            <!-- website -->

                                                    <img src="https://res.cloudinary.com/df80crgrw/image/upload/v1782294740/Frame_1984078843_levghf.png" width="24" height="24" alt="Website" style="display:block;border:0;outline:none;" />
                                                </td>
                                                <td width="12" style="width:12px;font-size:1px;line-height:1px;">&nbsp;</td>
                                                <td valign="middle" class="contact-text" style="font-family:'Montserrat','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;color:#353A3D;font-weight:400;">
                                                    <strong style="color:#353A3D;font-family:'Montserrat','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;text-decoration:none;">
                                                        <a href="https://prestonandco.com.au" target="_blank" style="color:#353A3D;text-decoration:none;font-family:'Montserrat','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;">www.prestonandco.com.au</a>
                                                    </strong>

                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- ========== ROW 2: spacer (gap under divider) ========== -->
                    <tr>
                        <td colspan="3" height="12" style="height:12px;font-size:1px;line-height:1px;">&nbsp;</td>
                    </tr>

                    <!-- ========== ROW 3: full-width gold line (will become 100% on mobile) ========== -->
                    <tr>
                        <td colspan="3" width="314" height="1" bgcolor="#DCBB9A" class="full-divider"
                            style="width:314px;font-size:1px;line-height:1.5px;height:1.5px;background-color:#DCBB9A;">

                    <!-- ========== ROW 4: tagline ========== -->
